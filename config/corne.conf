# RGB Underglow + Per-key LEDs
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# RGB defaults - low brightness to reduce current draw at 3.3V
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=25
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3

# OLED Display (SSD1306 128x32)
CONFIG_ZMK_DISPLAY=y

# Increase Bluetooth transmit power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
